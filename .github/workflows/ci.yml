name: validate-build-deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:        # run required checks against queued merge batches

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate data (schema + integrity + sourcing gate)
        run: python validate.py
      - name: Build graph (smoke test)
        run: python build_kalshi_network.py
      - name: Assemble Pages site
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p site
          cp kalshi_influence_network.html site/index.html
          cp nodes.csv edges.csv site/ 2>/dev/null || true
      - name: Upload built site
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Publish the built graph to GitHub Pages on every push to main.
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
